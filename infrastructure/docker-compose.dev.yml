version: '3.9'

# Development override — runs only infrastructure services.
# Run backend and frontend natively with hot reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cd ../backend && npm run start:dev
#   cd ../frontend && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: servisite_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: servisite
      POSTGRES_PASSWORD: servisite_dev
      POSTGRES_DB: servisite_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servisite -d servisite_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin for local DB management (optional, dev only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servisite_dev_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@servisite.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - tools

  # Redis — caching layer (always on in dev)
  redis:
    image: redis:7-alpine
    container_name: servisite_dev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_dev_data:
    driver: local
