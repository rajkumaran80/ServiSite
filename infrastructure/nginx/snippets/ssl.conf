# SSL / TLS configuration snippet
# Include in each HTTPS server block:
#   include /etc/nginx/snippets/ssl.conf;
#
# Requires Let's Encrypt certificates at:
#   /etc/letsencrypt/live/servisite.com/fullchain.pem
#   /etc/letsencrypt/live/servisite.com/privkey.pem
#   /etc/letsencrypt/live/servisite.com/chain.pem   (for OCSP stapling)
#
# Generate wildcard cert:
#   certbot certonly --dns-cloudflare \
#     -d servisite.com -d "*.servisite.com" \
#     --dns-cloudflare-credentials /root/.cloudflare.ini

ssl_certificate     /etc/letsencrypt/live/servisite.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/servisite.com/privkey.pem;

# Protocols & ciphers (Mozilla "Intermediate" profile)
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers off;

# Session
ssl_session_timeout 1d;
ssl_session_cache   shared:SSL:10m;
ssl_session_tickets off;

# DH parameters (generate with: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
# ssl_dhparam /etc/nginx/dhparam.pem;

# OCSP stapling
ssl_stapling        on;
ssl_stapling_verify on;
ssl_trusted_certificate /etc/letsencrypt/live/servisite.com/chain.pem;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;
