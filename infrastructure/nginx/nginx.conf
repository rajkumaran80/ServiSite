user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    application/javascript
    application/json
    application/xml
    font/woff
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Proxy cache settings
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=500m inactive=60m use_temp_path=off;

  # Upstream: Next.js frontend
  upstream frontend {
    server frontend:3000;
    keepalive 32;
  }

  # Upstream: NestJS backend API
  upstream backend_api {
    server backend:4000;
    keepalive 16;
  }

  # ─────────────────────────────────────────────
  # HTTP → HTTPS redirect (all hosts)
  # ─────────────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Health check endpoint (load balancer probe)
    location /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─────────────────────────────────────────────
  # API subdomain: api.servisite.com
  # ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.servisite.com;

    include /etc/nginx/snippets/ssl.conf;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Auth endpoints — stricter rate limit
    location ~ ^/api/auth/(login|refresh) {
      limit_req zone=login burst=10 nodelay;
      limit_req_status 429;
      proxy_pass http://backend_api;
      include /etc/nginx/snippets/proxy_headers.conf 2>/dev/null;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      limit_conn conn_limit 20;
      proxy_pass http://backend_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
      client_max_body_size 15M;
    }

    # Swagger docs (only allow internal / whitelist in production)
    location /docs {
      proxy_pass http://backend_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ─────────────────────────────────────────────
  # Main domain: servisite.com / www.servisite.com
  # ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name servisite.com www.servisite.com;

    include /etc/nginx/snippets/ssl.conf;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.blob.core.windows.net; connect-src 'self' https://api.servisite.com wss:; frame-src 'self' https://maps.google.com;" always;

    # Redirect www → apex
    if ($host = www.servisite.com) {
      return 301 https://servisite.com$request_uri;
    }

    # Static assets — long cache
    location /_next/static/ {
      proxy_pass http://frontend;
      proxy_cache static_cache;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_set_header Host $host;
    }

    location /favicon.ico {
      proxy_pass http://frontend;
      proxy_cache static_cache;
      proxy_cache_valid 200 7d;
      add_header Cache-Control "public, max-age=604800";
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }

  # ─────────────────────────────────────────────
  # Tenant subdomains: *.servisite.com
  # ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<tenant_slug>[^.]+)\.servisite\.com$;

    # Skip known non-tenant subdomains
    if ($tenant_slug ~* "^(www|api|mail|smtp|ftp|cpanel|admin)$") {
      return 404;
    }

    include /etc/nginx/snippets/ssl.conf;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Pass tenant slug to frontend via header (Next.js middleware reads it)
    proxy_set_header X-Tenant-Slug $tenant_slug;

    location /_next/static/ {
      proxy_pass http://frontend;
      proxy_cache static_cache;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_set_header Host $host;
      proxy_set_header X-Tenant-Slug $tenant_slug;
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Tenant-Slug $tenant_slug;
      proxy_read_timeout 30s;
    }
  }
}
