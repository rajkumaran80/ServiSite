<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Room depth gradient -->
    <linearGradient id="room" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0e05"/>
      <stop offset="45%" stop-color="#2d1a0a"/>
      <stop offset="100%" stop-color="#3d2210"/>
    </linearGradient>
    <!-- Warm candlelight glow -->
    <radialGradient id="glow1" cx="35%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="68%" cy="52%" r="28%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="82%" cy="58%" r="18%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <!-- Window light -->
    <linearGradient id="windowGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Pendant lamp gradient -->
    <radialGradient id="lamp1" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lamp2" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <!-- Wood table texture -->
    <linearGradient id="tableTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b3f1f"/>
      <stop offset="50%" stop-color="#5a3418"/>
      <stop offset="100%" stop-color="#3d2210"/>
    </linearGradient>
    <linearGradient id="tableTop2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c4a25"/>
      <stop offset="50%" stop-color="#6b3f1f"/>
      <stop offset="100%" stop-color="#4a2a12"/>
    </linearGradient>
    <!-- Chair seat -->
    <linearGradient id="chairSeat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a2c14"/>
      <stop offset="100%" stop-color="#2d1a0a"/>
    </linearGradient>
    <!-- Wall panels -->
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0e05"/>
      <stop offset="100%" stop-color="#2d1a0a"/>
    </linearGradient>
    <!-- Floor reflection -->
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d2210"/>
      <stop offset="100%" stop-color="#1a0e05"/>
    </linearGradient>
  </defs>

  <!-- Background room -->
  <rect width="1200" height="675" fill="url(#room)"/>

  <!-- Rear wall panelling -->
  <rect x="0" y="0" width="1200" height="350" fill="url(#wall)" opacity="0.6"/>

  <!-- Wall decorative panels (wainscoting effect) -->
  <rect x="30" y="60" width="180" height="240" rx="4" fill="none" stroke="#4a2c14" stroke-width="1.5" opacity="0.5"/>
  <rect x="45" y="75" width="150" height="210" rx="2" fill="none" stroke="#4a2c14" stroke-width="0.8" opacity="0.4"/>
  <rect x="220" y="60" width="200" height="240" rx="4" fill="none" stroke="#4a2c14" stroke-width="1.5" opacity="0.5"/>
  <rect x="235" y="75" width="170" height="210" rx="2" fill="none" stroke="#4a2c14" stroke-width="0.8" opacity="0.4"/>
  <rect x="760" y="60" width="200" height="240" rx="4" fill="none" stroke="#4a2c14" stroke-width="1.5" opacity="0.5"/>
  <rect x="775" y="75" width="170" height="210" rx="2" fill="none" stroke="#4a2c14" stroke-width="0.8" opacity="0.4"/>
  <rect x="980" y="60" width="190" height="240" rx="4" fill="none" stroke="#4a2c14" stroke-width="1.5" opacity="0.5"/>
  <rect x="995" y="75" width="160" height="210" rx="2" fill="none" stroke="#4a2c14" stroke-width="0.8" opacity="0.4"/>

  <!-- Window on left wall with warm glow -->
  <rect x="440" y="40" width="320" height="220" rx="3" fill="url(#windowGlow)" stroke="#6b3f1f" stroke-width="2" opacity="0.7"/>
  <!-- Window dividers -->
  <line x1="600" y1="40" x2="600" y2="260" stroke="#5a3418" stroke-width="2" opacity="0.6"/>
  <line x1="440" y1="150" x2="760" y2="150" stroke="#5a3418" stroke-width="2" opacity="0.6"/>
  <!-- Window sheen -->
  <rect x="445" y="45" width="145" height="100" rx="2" fill="#fef3c7" opacity="0.04"/>

  <!-- Ceiling features - decorative beam -->
  <rect x="0" y="0" width="1200" height="30" fill="#0f0804" opacity="0.8"/>
  <rect x="0" y="28" width="1200" height="5" fill="#2d1a0a" opacity="0.6"/>

  <!-- Pendant lights cables -->
  <line x1="380" y1="0" x2="380" y2="105" stroke="#1a0e05" stroke-width="3" opacity="0.8"/>
  <line x1="820" y1="0" x2="820" y2="95" stroke="#1a0e05" stroke-width="3" opacity="0.8"/>

  <!-- Pendant lamp 1 (left) -->
  <ellipse cx="380" cy="108" rx="30" ry="12" fill="#3d2210" opacity="0.95"/>
  <ellipse cx="380" cy="110" rx="22" ry="8" fill="#fef3c7" opacity="0.7"/>
  <!-- Lamp glow cone -->
  <ellipse cx="380" cy="380" rx="220" ry="60" fill="url(#lamp1)" opacity="0.55"/>

  <!-- Pendant lamp 2 (right) -->
  <ellipse cx="820" cy="98" rx="28" ry="11" fill="#3d2210" opacity="0.95"/>
  <ellipse cx="820" cy="100" rx="20" ry="7" fill="#fef3c7" opacity="0.65"/>
  <!-- Lamp glow cone -->
  <ellipse cx="820" cy="360" rx="190" ry="55" fill="url(#lamp2)" opacity="0.5"/>

  <!-- Ambient glow fills -->
  <rect x="0" y="0" width="1200" height="675" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1200" height="675" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1200" height="675" fill="url(#glow3)"/>

  <!-- Floor (dark polished wood) -->
  <rect x="0" y="480" width="1200" height="195" fill="url(#floor)" opacity="0.95"/>
  <!-- Floor planks -->
  <line x1="0" y1="510" x2="1200" y2="510" stroke="#2d1a0a" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#2d1a0a" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#2d1a0a" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#2d1a0a" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#2d1a0a" stroke-width="0.6" opacity="0.4"/>
  <!-- Floor vertical planks -->
  <line x1="200" y1="480" x2="180" y2="675" stroke="#2d1a0a" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="480" x2="380" y2="675" stroke="#2d1a0a" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="480" x2="590" y2="675" stroke="#2d1a0a" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="480" x2="800" y2="675" stroke="#2d1a0a" stroke-width="1" opacity="0.3"/>
  <line x1="1000" y1="480" x2="1010" y2="675" stroke="#2d1a0a" stroke-width="1" opacity="0.3"/>

  <!-- TABLE 1 (foreground left) -->
  <!-- Table top -->
  <ellipse cx="310" cy="470" rx="145" ry="30" fill="url(#tableTop)" opacity="0.95"/>
  <!-- Table edge shine -->
  <ellipse cx="310" cy="468" rx="143" ry="28" fill="none" stroke="#8b5a2b" stroke-width="1" opacity="0.4"/>
  <!-- Table legs -->
  <rect x="290" y="470" width="10" height="120" fill="#2d1a0a" opacity="0.9"/>
  <rect x="320" y="470" width="10" height="120" fill="#2d1a0a" opacity="0.9"/>
  <!-- Table reflection on floor -->
  <ellipse cx="310" cy="492" rx="145" ry="18" fill="#8b5a2b" opacity="0.12"/>
  <!-- Candle on table -->
  <rect x="302" y="430" width="8" height="32" rx="1" fill="#fef3c7" opacity="0.9"/>
  <ellipse cx="306" cy="430" rx="5" ry="10" fill="#fbbf24" opacity="0.6"/>
  <!-- Wine glasses -->
  <ellipse cx="350" cy="452" rx="12" ry="4" fill="#fef3c7" opacity="0.15"/>
  <rect x="348" y="420" width="4" height="32" fill="#fef3c7" opacity="0.1"/>
  <ellipse cx="270" cy="455" rx="11" ry="3.5" fill="#fef3c7" opacity="0.12"/>
  <rect x="268" y="424" width="4" height="31" fill="#fef3c7" opacity="0.09"/>
  <!-- Plate -->
  <ellipse cx="310" cy="465" rx="22" ry="7" fill="#f5f0e8" opacity="0.15"/>

  <!-- CHAIR L1 -->
  <rect x="170" y="430" width="80" height="55" rx="5" fill="url(#chairSeat)" opacity="0.9"/>
  <rect x="175" y="385" width="70" height="50" rx="8" fill="#3d2210" opacity="0.85"/>
  <!-- Chair legs -->
  <rect x="178" y="484" width="8" height="50" fill="#2d1a0a" opacity="0.8"/>
  <rect x="234" y="484" width="8" height="50" fill="#2d1a0a" opacity="0.8"/>

  <!-- CHAIR R1 -->
  <rect x="380" y="430" width="80" height="55" rx="5" fill="url(#chairSeat)" opacity="0.9"/>
  <rect x="385" y="385" width="70" height="50" rx="8" fill="#3d2210" opacity="0.85"/>
  <rect x="388" y="484" width="8" height="50" fill="#2d1a0a" opacity="0.8"/>
  <rect x="444" y="484" width="8" height="50" fill="#2d1a0a" opacity="0.8"/>

  <!-- TABLE 2 (mid-right) -->
  <ellipse cx="860" cy="450" rx="130" ry="26" fill="url(#tableTop2)" opacity="0.92"/>
  <ellipse cx="860" cy="448" rx="128" ry="24" fill="none" stroke="#8b5a2b" stroke-width="1" opacity="0.35"/>
  <rect x="842" y="450" width="10" height="110" fill="#2d1a0a" opacity="0.9"/>
  <rect x="868" y="450" width="10" height="110" fill="#2d1a0a" opacity="0.9"/>
  <ellipse cx="860" cy="470" rx="130" ry="16" fill="#8b5a2b" opacity="0.1"/>
  <!-- Candle -->
  <rect x="854" y="415" width="7" height="28" rx="1" fill="#fef3c7" opacity="0.9"/>
  <ellipse cx="857" cy="415" rx="4" ry="8" fill="#fbbf24" opacity="0.5"/>
  <!-- Glasses -->
  <ellipse cx="890" cy="438" rx="10" ry="3.5" fill="#fef3c7" opacity="0.13"/>
  <rect x="888" y="410" width="3.5" height="28" fill="#fef3c7" opacity="0.09"/>
  <ellipse cx="830" cy="440" rx="10" ry="3.5" fill="#fef3c7" opacity="0.12"/>
  <rect x="828" y="412" width="3.5" height="28" fill="#fef3c7" opacity="0.09"/>

  <!-- CHAIR L2 -->
  <rect x="740" y="415" width="70" height="48" rx="5" fill="url(#chairSeat)" opacity="0.88"/>
  <rect x="745" y="375" width="60" height="45" rx="8" fill="#3d2210" opacity="0.85"/>
  <rect x="748" y="462" width="7" height="45" fill="#2d1a0a" opacity="0.8"/>
  <rect x="796" y="462" width="7" height="45" fill="#2d1a0a" opacity="0.8"/>

  <!-- CHAIR R2 -->
  <rect x="990" y="415" width="70" height="48" rx="5" fill="url(#chairSeat)" opacity="0.88"/>
  <rect x="995" y="375" width="60" height="45" rx="8" fill="#3d2210" opacity="0.85"/>
  <rect x="998" y="462" width="7" height="45" fill="#2d1a0a" opacity="0.8"/>
  <rect x="1046" y="462" width="7" height="45" fill="#2d1a0a" opacity="0.8"/>

  <!-- Background table (small, far) -->
  <ellipse cx="560" cy="360" rx="80" ry="16" fill="url(#tableTop)" opacity="0.6"/>
  <rect x="552" y="360" width="7" height="80" fill="#2d1a0a" opacity="0.7"/>
  <rect x="568" y="360" width="7" height="80" fill="#2d1a0a" opacity="0.7"/>
  <!-- Background chairs (small, far) -->
  <rect x="488" y="342" width="52" height="36" rx="4" fill="#3d2210" opacity="0.7"/>
  <rect x="610" y="342" width="52" height="36" rx="4" fill="#3d2210" opacity="0.7"/>

  <!-- Shelf / artwork on wall -->
  <rect x="455" y="290" width="290" height="4" fill="#5a3418" opacity="0.8"/>
  <!-- Art frame suggestion -->
  <rect x="490" y="190" width="95" height="95" rx="3" fill="none" stroke="#5a3418" stroke-width="2" opacity="0.5"/>
  <rect x="500" y="200" width="75" height="75" rx="2" fill="#2d1a0a" opacity="0.6"/>
  <rect x="610" y="195" width="110" height="90" rx="3" fill="none" stroke="#5a3418" stroke-width="2" opacity="0.5"/>
  <rect x="620" y="205" width="90" height="70" rx="2" fill="#2d1a0a" opacity="0.6"/>

  <!-- Plant silhouette (left corner) -->
  <rect x="50" y="360" width="18" height="80" rx="3" fill="#2d1a0a" opacity="0.9"/>
  <ellipse cx="59" cy="355" rx="38" ry="55" fill="#1a2e15" opacity="0.7"/>
  <ellipse cx="35" cy="330" rx="25" ry="38" fill="#1a2e15" opacity="0.6"/>
  <ellipse cx="83" cy="328" rx="22" ry="35" fill="#1a2e15" opacity="0.6"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect x="0" y="0" width="1200" height="675" fill="url(#vignette)"/>
</svg>
