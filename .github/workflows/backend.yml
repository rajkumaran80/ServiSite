name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  REGISTRY: servisite.azurecr.io
  IMAGE_NAME: servisite-backend
  APP_NAME: servisite-prod-backend
  RESOURCE_GROUP: servisite-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name servisite

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Deploy to staging slot
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --slot staging \
            --docker-custom-image-name ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for staging to be ready
        run: |
          az webapp start \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --slot staging
          sleep 30

      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --slot staging \
            --target-slot production

      - name: Azure Logout
        if: always()
        run: az logout || true
