name = "servisite-router"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "DOMAIN_CACHE"
id = "53cced6523ba4aa1a0f02a5b00418c6c"

# Routes: catch all traffic in the servisite.co.uk zone.
# The Worker skips *.servisite.co.uk internally — only rewrites custom domains.
[[routes]]
pattern = "*/*"
zone_name = "servisite.co.uk"
